<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - FutbolCamis</title>
    <link rel="stylesheet" href="../css/Tienda.css">
</head>
<body>
    <header>
        <div class="header-left"></div>
        <div class="header-center"><p>Carrito</p></div>
        <div class="header-right">
            
        </div>
    </header>

    <div id="contenedorCarrito">
        <div class="carrito-item">
            <img src="https://futbol24shop.com/images/2025/1115/TGTS-Retro-389.jpg" alt="Producto" class="carrito-img">
            <div class="carrito-info">
                <h3>Camiseta Real Madrid</h3>
                <p class="precio">89.99€</p>
            </div>
            <div class="carrito-controles">
                <button class="btn-cantidad btn-menos">-</button>
                <span class="cantidad">1</span>
                <button class="btn-cantidad btn-mas">+</button>
            </div>
            <div class="carrito-subtotal">
                <p>89.99€</p>
            </div>
            <button class="btn-eliminar">Eliminar</button>
        </div>

        <div class="carrito-item">
            <img src="https://futbol24shop.com/images/2025/0415/TGTS-Retro-124.jpg" alt="Producto" class="carrito-img">
            <div class="carrito-info">
                <h3>Camiseta Barcelona</h3>
                <p class="precio">79.99€</p>
            </div>
            <div class="carrito-controles">
                <button class="btn-cantidad btn-menos">-</button>
                <span class="cantidad">2</span>
                <button class="btn-cantidad btn-mas">+</button>
            </div>
            <div class="carrito-subtotal">
                <p>159.98€</p>
            </div>
            <button class="btn-eliminar">Eliminar</button>
        </div>

        <div class="carrito-item">
            <img src="https://futbol24shop.com/images/2025/0715/TGTS-Retro-206.jpg" alt="Producto" class="carrito-img">
            <div class="carrito-info">
                <h3>Camiseta Atletico Madrid</h3>
                <p class="precio">84.99€</p>
            </div>
            <div class="carrito-controles">
                <button class="btn-cantidad btn-menos">-</button>
                <span class="cantidad">1</span>
                <button class="btn-cantidad btn-mas">+</button>
            </div>
            <div class="carrito-subtotal">
                <p>84.99€</p>
            </div>
            <button class="btn-eliminar">Eliminar</button>
        </div>
    </div>

    <div class="carrito-resumen">
        <h2>Resumen del pedido</h2>
        <div class="resumen-linea">
            <span>Subtotal:</span>
            <span id="subtotal">334.96€</span>
        </div>
        <div class="resumen-linea">
            <span>Envío:</span>
            <span id="envio">4.99€</span>
        </div>
        <div class="resumen-linea total">
            <span>Total:</span>
            <span id="total">339.95€</span>
        </div>
        <button class="btn-comprar">Proceder al pago</button>
    </div>

    <footer>
        <p>© 2026 FutbolCamis - Todos los derechos reservados</p>
    </footer>
</body>
</html>
