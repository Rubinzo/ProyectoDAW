<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/Tienda.css">
</head>
<body>
    <header>
        <div class="header-left"></div>
        <div class="header-center"><p>Tienda</p></div>
        <div class="header-right">
            <p id="user">Hugo</p>
            <img src="/Img/carrito-de-compras.png" alt="Carrito">
        </div>
    </header>
    <nav id="nav">
        <nav id="filtros">
            <input type="text" placeholder="Nombre de la camiseta" id="inputNombre">
            <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="checkDefault">
            <label class="form-check-label" for="checkDefault">Selección</label>
            
            <div id="selector">
                <select name="curso" id="curso">
                    <optgroup label="DAW">
                        <option value="Primero">Primero</option>
                        <option value="Segundo">Segundo</option>
                    </optgroup>
                    <optgroup label="DAM">
                        <option value="Primero">Primero</option>
                        <option value="Segundo">Segundo</option>
                    </optgroup>
                </select>
            </div>
             
        </nav>    

        <p id="a"></p>
        
        <div id="contenedorProductos">


        </div>
        <footer>
            <p>Créditos</p>
        </footer>
        </nav>
    <script src="/js/Tienda.js"></script>
</body>
</html>
